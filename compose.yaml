services:
  # ===================
  # MariaDB
  # ===================
  mariadb:
    image: mariadb:11.8
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: tuno_db
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # Redis
  # ===================
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # Frontend (Next.js)
  # ===================
  frontend:
    image: hiib2046/tuno-frontend:latest
    restart: unless-stopped

  # ===================
  # Backend (Express)
  # ===================
  backend:
    image: hiib2046/tuno-backend:latest
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===================
  # WebSocket
  # ===================
  ws:
    image: hiib2046/tuno-ws:latest
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===================
  # AI API (FastAPI)
  # ===================
  ai-api:
    image: hiib2046/tuno-ai-api:latest
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  # ===================
  # Batch (Scheduler)
  # ===================
  batch:
    image: hiib2046/tuno-batch:latest
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  # ===================
  # Nginx (Reverse Proxy)
  # ===================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - ws
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_data:
