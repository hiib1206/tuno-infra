worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ===================
    # 기본 설정
    # ===================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 150M;

    # MIME 타입
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===================
    # 로깅
    # ===================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ===================
    # Gzip 압축
    # ===================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript
               image/svg+xml application/manifest+json;

    # ===================
    # 프록시 버퍼 설정
    # ===================
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # ===================
    # Rate Limit 설정
    # ===================
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_status 429;

    # ===================
    # 업스트림 정의
    # ===================
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:4000;
        keepalive 32;
    }

    upstream websocket {
        server ws:8080;
        keepalive 32;
    }

    # ===================
    # HTTP -> HTTPS 리다이렉트
    # ===================
    server {
        listen 80;
        server_name tunoinvest.com www.tunoinvest.com api.tunoinvest.com ws.tunoinvest.com;
        return 301 https://$host$request_uri;
    }

    # ===================
    # Frontend (HTTPS)
    # ===================
    server {
        listen 443 ssl;
        server_name tunoinvest.com www.tunoinvest.com;

        # SSL 인증서
        ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
        ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-private-key.pem;

        # 보안 헤더
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }

    # ===================
    # Backend API (HTTPS)
    # ===================
    server {
        listen 443 ssl;
        server_name api.tunoinvest.com;

        # SSL 인증서
        ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
        ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-private-key.pem;

        # 보안 헤더
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            # Rate Limit (초당 10회, 버스트 20)
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 타임아웃 설정
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # ===================
    # WebSocket (HTTPS)
    # ===================
    server {
        listen 443 ssl;
        server_name ws.tunoinvest.com;

        # SSL 인증서
        ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
        ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-private-key.pem;

        location / {
            proxy_pass http://websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 타임아웃 (24시간)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
