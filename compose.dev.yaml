services:
  # ===================
  # Frontend (Next.js)
  # ===================
  frontend:
    build:
      context: ../tuno-frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - "3000:3000"

  # ===================
  # Backend (Express)
  # ===================
  backend:
    build:
      context: ../tuno-backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - BACKEND_PORT=${BACKEND_PORT}

  # ===================
  # WebSocket
  # ===================
  ws:
    build:
      context: ../tuno-ws
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - WS_SERVER_PORT=${WS_SERVER_PORT}
      - WS_TRADING_MODE=${WS_TRADING_MODE}
      - WS_PROD_APP_KEY=${WS_PROD_APP_KEY}
      - WS_PROD_APP_SECRET=${WS_PROD_APP_SECRET}
      - WS_VPS_APP_KEY=${WS_VPS_APP_KEY}
      - WS_VPS_APP_SECRET=${WS_VPS_APP_SECRET}

  # ===================
  # AI API (FastAPI)
  # ===================
  ai-api:
    build:
      context: ../tuno-ai
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ../tuno-ai/gcs:/app/secrets:ro

  # ===================
  # Batch (Scheduler)
  # ===================
  batch:
    build:
      context: ../tuno-ai
      dockerfile: batch/Dockerfile
    env_file:
      - .env
